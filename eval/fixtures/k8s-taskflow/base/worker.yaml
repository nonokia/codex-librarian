apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/acme/taskflow-worker:1.4.0
          volumeMounts:
            - name: config
              mountPath: /etc/taskflow
      volumes:
        - name: config
          configMap:
            name: api-config
